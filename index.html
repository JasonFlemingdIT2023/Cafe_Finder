<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <link rel="stylesheet" href="style.css">
   <title>Cafe Finder</title>
</head>
<body>
    <div id="sidebar">
        <h1> Cafe Finder</h1>
        <div id="search-box">
           <input type="text" id="search-input" placeholder="Town or Street...">
           <button id="search-button">Search</button>
        </div>
        <button id="location-button"> My location</button>
        <div id="results-list">

        </div>
    </div>

    <div id="map">
        
    </div>

   <script src="config.js"></script>
   <script src="app.js"></script>
   <script>
     const script = document.createElement('script');
     script.src = script.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.apiKey}&libraries=places&callback=initMap`;
     script.async = true;
     script.defer = true;
     document.head.appendChild(script);
   </script>

</body>
</html>
